<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header-Start -->
    <div class="img-div"><img src="img/google.jpg" alt="resim" /></div>
    <!-- Header-End -->

    <!-- Content-Start -->
    <div>
        <p class="google-p">Search the web using Google!</p>
        <input id="input-1" type="text" size="46">
    </div>
    
    <div class="button">
        <button>Google Search</button>
        <button>I'm feeling lucky</button>
    </div>

    <div class="flex-container">
        <div class="d-1">
            <p class="d-1-p">Special Searches</p>
            <a href="#" class="d-1-a-1">Stanford Search</a><br>
            <a href="#" class="d-1-a-2">Linux Search</a>
        </div>
        <div class="d-2">
            <a id="dd-2-a-1" href="#">Help!</a><br>
            <a id="dd-2-a-2" href="#">About Google!</a><br>
            <a id="dd-2-a-3" href="#">Company Info</a><br>
            <a id="dd-2-a-4" href="#">Google! Logos</a><br>
        </div>
        <div class="d-3">
            <p class="d-3-p1">Get Google!</p>
            <p class="d-3-p2">updates monthly:</p>
            <input class="d-3-inp1" type="email"><br>
            <button class="d-3-btn1">Subscribe</button>
            <a class="d-3-a1" href="#">Archive</a>
        </div>  
    </div>
    <!-- Content-End -->
    <!-- Footer-Start -->
    <footer>
        <p class="enp-1">Copyright ©1998 Google Inc.</p>
    </footer>
    <!-- Footer-End -->
</body>
</html>
